name: Deploy ETL to HotGlue

run-name: >-
  Deploy →
  ${{ github.event.inputs.environment ||
      (github.ref_name == 'production' && 'prod.different.ai' || 'dev.different.ai') }}
  (${{ github.ref_name }})

on:
  push:
    branches: [main, production]
    # salesforce/** and hubspot/** match every file under those subdirs
    # (etl.py, utils.py, .hotgluerc, requirements.txt, snapshots/*, etc.).
    paths:
      - 'salesforce/**'
      - 'hubspot/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target HotGlue environment'
        required: true
        default: 'dev.different.ai'
        type: choice
        options:
          - dev.different.ai
          - prod.different.ai

permissions:
  contents: read

# Serialize by resolved target env so concurrent prod deploys (e.g. push to
# `production` and a manual dispatch from production) cannot interleave.
concurrency:
  group: >-
    deploy-${{ github.event.inputs.environment ||
               (github.ref_name == 'production' && 'prod.different.ai' || 'dev.different.ai') }}
  cancel-in-progress: false

jobs:
  guard:
    name: Guard manual prod dispatch
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Reject prod dispatch from non-production ref
        if: >-
          github.event.inputs.environment == 'prod.different.ai' &&
          github.ref != 'refs/heads/production'
        run: |
          echo "::error::workflow_dispatch with environment=prod.different.ai is only allowed from the 'production' branch (current ref: ${GITHUB_REF})."
          exit 1

  deploy:
    name: Deploy to HotGlue
    runs-on: ubuntu-latest
    needs: [guard]
    # `guard` is skipped for push events (its `if:` evaluates false), so we
    # accept either success or skipped here.
    if: |
      always() &&
      (needs.guard.result == 'success' || needs.guard.result == 'skipped')
    timeout-minutes: 15
    env:
      HOTGLUE_ENV: >-
        ${{ github.event.inputs.environment ||
            (github.ref_name == 'production' && 'prod.different.ai' || 'dev.different.ai') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify secret is set
        env:
          HOTGLUE_API_KEY: ${{ secrets.HOTGLUE_API_KEY }}
        run: |
          if [ -z "$HOTGLUE_API_KEY" ]; then
            echo "::error::HOTGLUE_API_KEY repository secret is not set"
            exit 1
          fi
          echo "Deploying to $HOTGLUE_ENV (ref ${GITHUB_REF_NAME})"

      - name: Deploy salesforce
        env:
          HOTGLUE_API_KEY: ${{ secrets.HOTGLUE_API_KEY }}
        run: |
          npx -y @hotglue/cli@1.1.0 etl deploy \
            --sourceFolder salesforce \
            --environment "$HOTGLUE_ENV" \
            --apikey "$HOTGLUE_API_KEY"

      - name: Deploy hubspot
        env:
          HOTGLUE_API_KEY: ${{ secrets.HOTGLUE_API_KEY }}
        run: |
          npx -y @hotglue/cli@1.1.0 etl deploy \
            --sourceFolder hubspot \
            --environment "$HOTGLUE_ENV" \
            --apikey "$HOTGLUE_API_KEY"

      - name: Partial-deploy warning
        if: failure()
        run: |
          echo "::warning::A deploy step failed. If salesforce succeeded but hubspot did not, the target env may be partially updated. Re-deploy from a known-good SHA via workflow_dispatch on the same branch, or revert and push to roll back."
